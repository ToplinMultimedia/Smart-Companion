<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART - Admin</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <div class="flex h-screen">
    <aside class="w-64 bg-surface border-r border-border hidden md:flex flex-col overflow-y-auto">
      <div class="p-6 border-b border-border">
        <h1 class="text-2xl font-bold mb-8">SMART Admin</h1>
        <nav class="space-y-2">
          <a href="/dashboard.html" class="block p-3 rounded-lg hover:bg-gray-100">📊 Dashboard</a>
          <a href="/admin.html" class="block p-3 rounded-lg bg-primary text-white">👨‍💼 Admin</a>
        </nav>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto flex flex-col">
      <header class="bg-surface border-b border-border sticky top-0 z-10">
        <div class="container flex-between p-4">
          <h1 class="text-2xl font-bold">Admin Dashboard</h1>
          <button class="btn btn-secondary" data-action="logout">Logout</button>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
          <div class="card">
            <div class="text-3xl font-bold text-primary" id="totalUsers">0</div>
            <div class="text-gray-600">Total Users</div>
          </div>
          <div class="card">
            <div class="text-3xl font-bold text-success" id="totalChats">0</div>
            <div class="text-gray-600">Total Chats</div>
          </div>
          <div class="card">
            <div class="text-3xl font-bold text-warning" id="totalTasks">0</div>
            <div class="text-gray-600">Total Tasks</div>
          </div>
          <div class="card">
            <div class="text-3xl font-bold text-info" id="totalGoals">0</div>
            <div class="text-gray-600">Total Goals</div>
          </div>
        </div>

        <div class="card">
          <h2 class="text-xl font-bold mb-4">Recent Logs</h2>
          <div id="auditLogs" class="space-y-2">
            <p class="text-gray-400">Loading...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/theme.js" type="module"></script>
  <script type="module">
    import { api } from './js/api.js';
    
    async function loadAnalytics() {
      try {
        const analytics = await api.getAnalytics();
        document.getElementById('totalUsers').textContent = analytics.totalUsers;
        document.getElementById('totalChats').textContent = analytics.totalChats;
        document.getElementById('totalTasks').textContent = analytics.totalTasks;
        document.getElementById('totalGoals').textContent = analytics.totalGoals;

        const logs = await api.getAuditLogs();
        const logsContainer = document.getElementById('auditLogs');
        logsContainer.innerHTML = logs.slice(0, 10).map(log => `
          <div class="p-3 bg-gray-50 rounded text-sm">
            <div class="font-semibold">${log.action}</div>
            <div class="text-xs text-gray-500">${new Date(log.created_at).toLocaleString()}</div>
          </div>
        `).join('') || '<p class="text-gray-400">No logs yet</p>';
      } catch (error) {
        console.error('Failed to load analytics:', error);
      }
    }

    loadAnalytics();
    setInterval(loadAnalytics, 30000); // Refresh every 30 seconds
  </script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
