<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART - Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-surface border-r border-border overflow-y-auto hidden md:block">
      <div class="p-6">
        <h1 class="text-2xl font-bold mb-8">SMART</h1>
        <nav class="space-y-2">
          <a href="/dashboard.html" class="block p-3 rounded-lg bg-primary text-white">📊 Dashboard</a>
          <a href="/chat.html" class="block p-3 rounded-lg hover:bg-surface-light">💬 Chat</a>
          <a href="/goals.html" class="block p-3 rounded-lg hover:bg-surface-light">🎯 Goals</a>
          <a href="/tasks.html" class="block p-3 rounded-lg hover:bg-surface-light">✅ Tasks</a>
          <a href="/notes.html" class="block p-3 rounded-lg hover:bg-surface-light">📝 Notes</a>
          <a href="/projects.html" class="block p-3 rounded-lg hover:bg-surface-light">📁 Projects</a>
        </nav>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <!-- Top Bar -->
      <header class="bg-surface border-b border-border sticky top-0 z-10">
        <div class="container flex-between p-4">
          <h1 class="text-2xl font-bold">Dashboard</h1>
          <div class="flex gap-4 items-center">
            <button class="btn-icon" id="themeToggle">☀️</button>
            <button class="btn btn-secondary" data-action="logout">Logout</button>
          </div>
        </div>
      </header>

      <!-- Dashboard Content -->
      <div class="container p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <div class="card">
            <div class="text-3xl font-bold text-primary">5</div>
            <div class="text-gray-600">Active Chats</div>
          </div>
          <div class="card">
            <div class="text-3xl font-bold text-success">12</div>
            <div class="text-gray-600">Completed Tasks</div>
          </div>
          <div class="card">
            <div class="text-3xl font-bold text-warning">3</div>
            <div class="text-gray-600">Active Goals</div>
          </div>
          <div class="card">
            <div class="text-3xl font-bold text-info">28</div>
            <div class="text-gray-600">Notes Created</div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="card">
            <h2 class="text-xl font-bold mb-4">Recent Chats</h2>
            <div id="chatsList" class="space-y-2">
              <div class="p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                <div class="font-semibold">AI Assistant</div>
                <div class="text-sm text-gray-500">Today at 2:30 PM</div>
              </div>
            </div>
          </div>

          <div class="card">
            <h2 class="text-xl font-bold mb-4">Quick Actions</h2>
            <div class="space-y-2">
              <a href="/chat.html" class="btn btn-primary w-full">💬 Start New Chat</a>
              <a href="/tasks.html" class="btn btn-secondary w-full">➕ Add Task</a>
              <a href="/goals.html" class="btn btn-secondary w-full">🎯 Set Goal</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/theme.js" type="module"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
