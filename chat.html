<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART - Chat</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .chat-layout {
      display: flex;
      height: 100vh;
    }
    .chat-sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .message {
      display: flex;
      gap: var(--space-3);
      animation: slideUp 0.3s ease-out;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message-content {
      max-width: 70%;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      word-wrap: break-word;
    }
    .message.user .message-content {
      background: var(--primary);
      color: white;
    }
    .message.ai .message-content {
      background: var(--border);
      color: var(--text);
    }
    .chat-input-area {
      border-top: 1px solid var(--border);
      padding: var(--space-4);
      background: var(--surface);
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-3);
    }
    .chat-item {
      padding: var(--space-3);
      background: var(--bg);
      border-radius: var(--radius-md);
      cursor: pointer;
      margin-bottom: var(--space-2);
      transition: all var(--transition-fast);
    }
    .chat-item:hover {
      background: var(--border);
    }
    .chat-item.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="chat-layout">
    <div class="chat-sidebar hidden md:flex">
      <div class="border-b border-border p-4">
        <button class="btn btn-primary w-full">✨ New Chat</button>
      </div>
      <div class="chat-list">
        <div id="chatsList"></div>
      </div>
      <div class="border-t border-border p-4">
        <button class="btn btn-secondary w-full" data-action="logout">Logout</button>
      </div>
    </div>

    <div class="chat-main">
      <header class="bg-surface border-b border-border p-4 flex-between">
        <div>
          <h1 class="text-xl font-bold">Chat with SMART</h1>
          <p class="text-sm text-gray-500">Powered by Groq AI</p>
        </div>
        <button class="btn-icon" id="themeToggle">☀️</button>
      </header>

      <div class="messages-container" id="messagesContainer"></div>

      <div class="chat-input-area">
        <div class="flex gap-2">
          <input type="text" id="messageInput" class="input flex-1" placeholder="Ask me anything..." autocomplete="off">
          <button class="btn btn-primary" id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/theme.js" type="module"></script>
  <script type="module">
    import { api } from './js/api.js';
    import { showToast } from './js/utils.js';
    
    let currentChatId = null;
    let messages = [];

    async function createNewChat() {
      try {
        const response = await api.createChat('New Chat', 'llama-4-scout');
        currentChatId = response[0]?.id;
        messages = [];
        document.getElementById('messagesContainer').innerHTML = '';
        loadChats();
      } catch (error) {
        showToast('Failed to create chat', 'error');
      }
    }

    async function loadChats() {
      try {
        const chats = await api.getChats();
        const chatsList = document.getElementById('chatsList');
        chatsList.innerHTML = chats.map(chat => `
          <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" data-id="${chat.id}">
            <div class="font-semibold text-sm">${chat.title}</div>
            <div class="text-xs text-gray-500">${new Date(chat.created_at).toLocaleDateString()}</div>
          </div>
        `).join('');

        chatsList.querySelectorAll('.chat-item').forEach(item => {
          item.addEventListener('click', async () => {
            currentChatId = item.dataset.id;
            messages = await api.getMessages(currentChatId);
            displayMessages();
            loadChats();
          });
        });

        if (!currentChatId && chats.length > 0) {
          currentChatId = chats[0].id;
          messages = await api.getMessages(currentChatId);
          displayMessages();
        }
      } catch (error) {
        console.error('Failed to load chats:', error);
      }
    }

    function displayMessages() {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = messages.map(msg => `
        <div class="message ${msg.role === 'user' ? 'user' : 'ai'} animate-slideUp">
          <div class="message-content">${escapeHtml(msg.content)}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content) return;
      if (!currentChatId) await createNewChat();

      input.value = '';
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;

      try {
        // Add user message
        await api.addMessage(currentChatId, 'user', content);
        messages.push({ role: 'user', content });
        displayMessages();

        // Get AI response
        const response = await api.groqRequest(
          [...messages.map(m => ({ role: m.role, content: m.content }))],
          'llama-4-scout'
        );

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let aiResponse = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const json = JSON.parse(line.slice(6));
                const content = json.choices[0]?.delta?.content || '';
                aiResponse += content;
              } catch (e) {}
            }
          }
        }

        if (aiResponse) {
          await api.addMessage(currentChatId, 'assistant', aiResponse);
          messages.push({ role: 'assistant', content: aiResponse });
          displayMessages();
        }
      } catch (error) {
        showToast('Error sending message: ' + error.message, 'error');
      } finally {
        input.disabled = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initial load
    await createNewChat();
    await loadChats();
  </script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
