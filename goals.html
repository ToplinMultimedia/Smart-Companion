<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART - Goals</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <style>
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-4);
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin: var(--space-3) 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="flex h-screen">
    <aside class="w-64 bg-surface border-r border-border hidden md:flex flex-col overflow-y-auto">
      <div class="p-6 border-b border-border">
        <h1 class="text-2xl font-bold mb-8">SMART</h1>
        <nav class="space-y-2">
          <a href="/dashboard.html" class="block p-3 rounded-lg hover:bg-gray-100">📊 Dashboard</a>
          <a href="/chat.html" class="block p-3 rounded-lg hover:bg-gray-100">💬 Chat</a>
          <a href="/goals.html" class="block p-3 rounded-lg bg-primary text-white">🎯 Goals</a>
          <a href="/tasks.html" class="block p-3 rounded-lg hover:bg-gray-100">✅ Tasks</a>
          <a href="/notes.html" class="block p-3 rounded-lg hover:bg-gray-100">📝 Notes</a>
          <a href="/projects.html" class="block p-3 rounded-lg hover:bg-gray-100">📁 Projects</a>
        </nav>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto flex flex-col">
      <header class="bg-surface border-b border-border sticky top-0 z-10">
        <div class="container flex-between p-4">
          <h1 class="text-2xl font-bold">Goals</h1>
          <div class="flex gap-4">
            <button class="btn-icon" id="themeToggle">☀️</button>
            <button class="btn btn-primary" id="newGoalBtn">+ New Goal</button>
            <button class="btn btn-secondary" data-action="logout">Logout</button>
          </div>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto p-6">
        <div id="goalsList" class="space-y-3">
          <div class="text-center py-12 text-gray-400"><p>🎯 No goals yet!</p></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="goalModal">
    <div class="modal animate-slideDown">
      <h2 class="text-2xl font-bold mb-4">Create Goal</h2>
      <form id="goalForm" class="space-y-4">
        <div class="input-group">
          <label class="input-label">Goal Title *</label>
          <input type="text" id="goalTitle" class="input" required placeholder="What do you want to achieve?">
        </div>
        <div class="input-group">
          <label class="input-label">Description</label>
          <textarea id="goalDesc" class="textarea" placeholder="Why is this goal important?"></textarea>
        </div>
        <div class="input-group">
          <label class="input-label">Deadline</label>
          <input type="date" id="goalDeadline" class="input">
        </div>
        <div class="flex gap-2">
          <button type="button" class="btn btn-secondary flex-1" id="closeGoalModal">Cancel</button>
          <button type="submit" class="btn btn-primary flex-1">Create Goal</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/theme.js" type="module"></script>
  <script type="module">
    import { api } from './js/api.js';
    import { showToast, formatDate } from './js/utils.js';
    
    let allGoals = [];

    async function loadGoals() {
      try {
        allGoals = await api.getGoals();
        displayGoals();
      } catch (error) {
        console.error('Failed to load goals:', error);
      }
    }

    function displayGoals() {
      const container = document.getElementById('goalsList');
      if (allGoals.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-gray-400"><p>🎯 No goals yet!</p></div>';
        return;
      }

      container.innerHTML = allGoals.map(goal => `
        <div class="goal-card animate-fadeIn">
          <div class="flex-between mb-3">
            <div class="flex-1">
              <h3 class="text-lg font-semibold">${goal.title}</h3>
              ${goal.description ? `<p class="text-sm text-gray-500">${goal.description}</p>` : ''}
            </div>
            <button class="btn-icon delete-goal" data-id="${goal.id}">🗑️</button>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${goal.progress || 0}%"></div>
          </div>
          <div class="flex-between text-sm">
            <span>${goal.progress || 0}% Complete</span>
            <input type="range" class="progress-input" data-id="${goal.id}" min="0" max="100" value="${goal.progress || 0}" style="flex: 1; margin: 0 var(--space-4);">
          </div>
        </div>
      `).join('');

      container.querySelectorAll('.progress-input').forEach(input => {
        input.addEventListener('input', async (e) => {
          const progress = parseInt(e.target.value);
          await api.updateGoal(e.target.dataset.id, { progress });
          loadGoals();
        });
      });

      container.querySelectorAll('.delete-goal').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm('Delete this goal?')) {
            await api.deleteGoal(btn.dataset.id);
            loadGoals();
            showToast('Goal deleted', 'success');
          }
        });
      });
    }

    document.getElementById('newGoalBtn').addEventListener('click', () => {
      document.getElementById('goalModal').classList.add('active');
    });

    document.getElementById('closeGoalModal').addEventListener('click', () => {
      document.getElementById('goalModal').classList.remove('active');
    });

    document.getElementById('goalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api.createGoal(
          document.getElementById('goalTitle').value,
          document.getElementById('goalDesc').value,
          document.getElementById('goalDeadline').value || null
        );
        showToast('Goal created!', 'success');
        document.getElementById('goalModal').classList.remove('active');
        document.getElementById('goalForm').reset();
        loadGoals();
      } catch (error) {
        showToast('Failed to create goal', 'error');
      }
    });

    loadGoals();
  </script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
