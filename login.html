<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART - Login</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: var(--space-4);
    }
    .auth-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow-xl);
      animation: slideUp 0.3s ease-out;
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .auth-header h1 {
      font-size: var(--font-size-2xl);
      margin-bottom: var(--space-2);
    }
    .auth-header p {
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
    }
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-label {
      display: block;
      font-weight: var(--font-weight-medium);
      margin-bottom: var(--space-2);
      color: var(--text);
    }
    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      font-size: var(--font-size-base);
      transition: border-color var(--transition-fast);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }
    .submit-btn {
      width: 100%;
      padding: var(--space-3);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: var(--font-size-base);
    }
    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .divider {
      text-align: center;
      margin: var(--space-4) 0;
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
    }
    .divider::before,
    .divider::after {
      content: '';
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: var(--font-weight-medium);
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      display: none;
      font-size: var(--font-size-sm);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .error-message.show {
      display: block;
      animation: slideDown 0.3s ease-out;
    }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <!-- Header -->
      <div class="auth-header">
        <h1>✨ SMART</h1>
        <p>Welcome back</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <!-- Email -->
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="your@email.com" 
            required
            autocomplete="email"
          >
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••" 
            required
            autocomplete="current-password"
          >
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submitBtn">
          Sign In
        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="auth-footer">
        <p>Don't have an account? <a href="/signup.html">Create one</a></p>
      </div>

      <!-- Theme Toggle -->
      <div style="text-align: center; margin-top: var(--space-4);">
        <button class="btn-icon" id="themeToggle">☀️</button>
      </div>
    </div>
  </div>

  <script src="js/config.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/theme.js" type="module"></script>
  <script type="module">
    import { CONFIG } from './js/config.js';
    import { showToast } from './js/utils.js';

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Clear error
      errorMsg.classList.remove('show');

      if (!email || !password) {
        showError('Email and password required');
        return;
      }

      try {
        // Disable button
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span>Signing in...';

        // Call Supabase login endpoint
        const response = await fetch(
          `${CONFIG.supabase.url}/auth/v1/token?grant_type=password`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': CONFIG.supabase.key
            },
            body: JSON.stringify({
              email: email,
              password: password
            })
          }
        );

        const data = await response.json();

        console.log('Login Response:', data);

        if (!response.ok) {
          const errorText = data.error_description || data.message || data.error || 'Login failed';
          throw new Error(errorText);
        }

        if (!data.access_token) {
          throw new Error('No access token received');
        }

        // Save session
        localStorage.setItem('auth-token', data.access_token);
        localStorage.setItem('auth-user', JSON.stringify({
          id: data.user?.id,
          email: data.user?.email
        }));

        console.log('Login successful!');
        showToast('Login successful!', 'success');

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 500);
      } catch (error) {
        console.error('Login error:', error);
        
        let errorText = error.message;
        if (errorText.includes('Invalid login credentials')) {
          errorText = 'Invalid email or password';
        }
        if (errorText.includes('Email not confirmed')) {
          errorText = 'Please confirm your email first';
        }

        showError(errorText);
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In';
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
      window.scrollTo(0, 0);
    }
  </script>
</body>
</html>
